# Controller declarations for the gb1 (granular sample voice) SC patch.
# Matches the zynthian_engine_puredata.py zynconfig.yml schema — any
# ctrl_group: {name: options} entry becomes a zynthian_controller. Values here
# mirror the \gb1 SynthDef's own defaults (see 0_startup/_includes/_zyn-patches/
# gb1-patch.scd in the supercollider repo, which is what actually plays this).
#
# osc_path must match "/scengine/<name>" — that's the exact literal OSCdef path
# each param registers via ~zynRegisterParam in zyn-engine-bridge.scd.
Grain:
  amp:
    name: "Amp"
    value: 1.0
    value_min: 0.0
    value_max: 1.0
    osc_path: "/scengine/amp"
  trig_rate:
    name: "Trig Rate"
    value: 8
    value_min: 1
    value_max: 60
    osc_path: "/scengine/trig_rate"
  grain_dur:
    name: "Grain Dur"
    value: 0.05
    value_min: 0.01
    value_max: 0.3
    osc_path: "/scengine/grain_dur"
  pan_rate:
    name: "Pan Rate"
    value: 10
    value_min: 0
    value_max: 40
    osc_path: "/scengine/pan_rate"
