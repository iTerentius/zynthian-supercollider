Sample:
  folder:
    name: "Sample Folder"
    is_path: true
    path_file_types: ["wav", "aiff", "flac", "ogg", "mp3"]
    osc_path: "/scengine/samplefolder"
Slice:
  amp:
    name: "Amp"
    value: 0.5
    value_min: 0.0
    value_max: 1.0
    osc_path: "/scengine/amp"
  nSlices:
    name: "Num Slices"
    value: 8
    value_min: 1
    value_max: 32
    is_integer: true
    osc_path: "/scengine/nSlices"
  rate:
    name: "Rate"
    value: 1.0
    value_min: 0.25
    value_max: 4.0
    osc_path: "/scengine/rate"
  pan:
    name: "Pan"
    value: 0.0
    value_min: -1.0
    value_max: 1.0
    osc_path: "/scengine/pan"
  spread:
    name: "Spread"
    value: 0.0
    value_min: 0.0
    value_max: 1.0
    osc_path: "/scengine/spread"
  rev:
    name: "Reverse"
    value: 0
    value_min: 0
    value_max: 1
    is_toggle: true
    osc_path: "/scengine/rev"
  mode:
    name: "Seq/Rand"
    value: 0
    value_min: 0
    value_max: 1
    is_toggle: true
    osc_path: "/scengine/mode"
